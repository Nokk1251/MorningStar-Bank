{% extends "base.html" %}
{% block title %}Login{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6 col-lg-5">
    <div class="cardx p-4">
      <h1 class="h4 mb-3">Login</h1>

      <form method="post" action="{{ url_for('login_post') }}">
        <label class="form-label">Username</label>
        <input class="form-control mb-2" name="username" autocomplete="username" required>

        <label class="form-label">Password</label>
        <input class="form-control mb-3" type="password" name="password" autocomplete="current-password" required>

        <button class="btn btn-warning w-100" type="submit">Login</button>
      </form>

      <div class="muted small mt-3">
        No account? <a class="link-warning" href="{{ url_for('register_get') }}">Register</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
